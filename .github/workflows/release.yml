name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev \
            libusb-1.0-0-dev

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm run rebuild
        env:
          CXXFLAGS: -std=c++17

      - name: Run tests
        run: npm test

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            npm_script: dist:mac
          - os: ubuntu-latest
            platform: linux
            npm_script: dist:linux
          - os: windows-latest
            platform: win
            npm_script: dist:win

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools \
            rpm \
            libudev-dev \
            libusb-1.0-0-dev

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm run rebuild
        env:
          CXXFLAGS: -std=c++17

      - name: Prepare macOS code signing
        if: matrix.platform == 'mac'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/adoo-macos-signing.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          echo "MACOS_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_DISCOVERY=true" >> "$GITHUB_ENV"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build application
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ] && [ "${MACOS_SIGNING_ENABLED:-false}" = "true" ]; then
            npm run dist:mac -- --config.mac.hardenedRuntime=true
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            CSC_IDENTITY_AUTO_DISCOVERY=false npm run dist:mac
          else
            npm run ${{ matrix.npm_script }}
          fi

      - name: Collect release artifacts
        run: bash scripts/collect-release-artifacts.sh ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.platform }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Sync CHANGELOG from commits
        run: node scripts/sync-changelog.js "${GITHUB_REF_NAME#v}"

      - name: Build release notes file
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/release-notes.js "$VERSION" > release-body.md

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-mac
          path: artifacts/mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-win
          path: artifacts/win

      - name: List release files
        run: |
          find artifacts -maxdepth 2 -type f | sort

      - name: Validate update metadata
        run: |
          set -euo pipefail
          test -f artifacts/win/latest.yml
          test -f artifacts/mac/latest-mac.yml
          test -f artifacts/linux/latest-linux.yml
          echo "Update metadata present for Windows, macOS and Linux."

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: adoo IoT ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
          overwrite: true
          files: |
            artifacts/mac/*
            artifacts/linux/*
            artifacts/win/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Push CHANGELOG to main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          node scripts/sync-changelog.js "$VERSION"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "CHANGELOG.md already up to date on main."
          else
            git commit -m "[REL] docs: update CHANGELOG for v${VERSION}"
            git push origin main
          fi
