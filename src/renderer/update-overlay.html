<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file:" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updating</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.55);
        color: #f2f3f5;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        user-select: none;
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: min(280px, calc(100vw - 48px));
        padding: 20px 18px 18px;
        border-radius: 10px;
        background: #2b2d31;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        object-fit: contain;
      }

      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-top-color: #5865f2;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
        text-align: center;
        line-height: 1.35;
      }

      .detail {
        text-align: center;
        font-size: 12px;
        line-height: 1.45;
        color: #b5bac1;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="card">
        <img id="logo" class="logo" src="../../icon.png" alt="" />
        <div class="spinner" aria-hidden="true"></div>
        <div id="title" class="title"></div>
        <div id="detail" class="detail"></div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById('title').textContent = params.get('title') || 'Updating...';
      document.getElementById('detail').textContent = params.get('detail') || '';
    </script>
  </body>
</html>
